<!doctype html>
<html lang="ko">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>GATE1253</title>
	<style>
		.loader {
			border: 2px solid #f3f3f3;
			border-top: 2px solid #3498db;
			border-radius: 50%;
			width: 16px;
			height: 16px;
			animation: spin 1s linear infinite;
		}

		@keyframes spin {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}
	</style>
	<link rel="stylesheet" href="assets/style.css" />
</head>

<body>
	<a class="top-right-support" href="/support/" title="지원 페이지 열기" aria-label="지원 페이지">Support</a>

	<div class="top-left-nav">
		<a class="top-right-intro" href="/support/intro.mp4" title="소개 영상 열기" aria-label="소개 영상">Intro</a>
		<a class="top-right-doc" href="/support/presentation.pdf" target="_blank" rel="noopener noreferrer"
			title="프레젠테이션 PDF 열기" aria-label="프레젠테이션 PDF">Presentation</a>
		<button id="info-btn" class="top-right-info-btn hidden" title="설명 정보 열기" aria-label="설명 정보">Info</button>
	</div>

	<div id="auth-container" class="auth-widget"></div>

	<main class="container" role="main">
		<div class="brand" role="banner">
			<img id="logo-img" class="logo" src="assets/images/logo-r3.jpg" alt="R3">
			<div class="service-toggle">
				<a id="r1-btn" class="service-toggle-btn hidden" href="#" title="R1" aria-label="R1">R1</a>
				<a id="r2-btn" class="service-toggle-btn hidden" href="#" title="R2" aria-label="R2">R2</a>
				<a id="r5-btn" class="service-toggle-btn hidden" href="#" title="R5" aria-label="R5">R5</a>
				<a id="r3-btn" class="service-toggle-btn active" href="#" title="R3" aria-label="R3">R3</a>
			</div>
			<p id="lead-text" class="lead">간단하고 빠른 단축 URL 생성 서비스</p>
		</div>

		<section aria-labelledby="shorten-heading">
			<h2 id="shorten-heading" class="sr-only">단축 URL 생성</h2>
			<div id="search-wrap" class="search-wrap">
				<form class="search-box"
					onsubmit="event.preventDefault(); document.getElementById('shorten-btn').click();">
					<input id="url-input" type="url" placeholder="원본 URL을 입력하세요 (예: https://example.com)"
						aria-label="원본 URL" />
					<button id="shorten-btn" type="button">
						<span class="button-text">CREATE</span>
						<div class="loader hidden"></div>
					</button>
				</form>

				<div id="alias-input-container" class="search-box alias-box hidden">
					<input id="alias-input" type="text" placeholder="커스텀 코드 (선택 사항)" aria-label="커스텀 코드">
				</div>

				<div id="expiration-input-container" class="search-box alias-box hidden">
					<input id="expiration-input" type="text" placeholder="만료일" aria-label="만료일">
					<label class="utc-label">
						<input type="checkbox" id="utc-checkbox"> UTC
					</label>
				</div>
			</div>
			<p id="custom-code-note" class="note" style="text-align:center;margin:8px 0 0">비회원은 커스텀 코드를 제공할 수 없습니다. 커스텀
				코드가 필요하면 회원으로 로그인하세요.</p>
			<div id="msg" class="status" role="status" aria-live="polite"></div>
		</section>
	</main>

	<!-- 모달: 계정 정보 -->
	<div id="api-key-modal" class="modal-overlay hidden">
		<div class="modal-content">
			<button class="modal-close-btn" id="modal-close-btn">&times;</button>
			<h2>내 계정 정보</h2>
			<p>아래 정보를 사용하여 API를 호출하거나 계정을 식별할 수 있습니다.</p>

			<div class="api-key-section">
				<h3>API 키</h3>
				<div class="api-key-display">
					<code id="display-api-key"></code>
					<button id="copy-api-key-btn" class="btn primary small">COPY</button>
				</div>
			</div>

			<div class="user-id-section">
				<h3>고유 사용자 ID</h3>
				<div class="api-key-display">
					<code id="display-unique-user-id"></code>
					<button id="copy-user-id-btn" class="btn primary small">COPY</button>
				</div>
			</div>

			<p class="modal-message" id="modal-message"></p>
		</div>
	</div>

	<!-- 모달: R1/R2 설명 -->
	<div id="info-modal" class="modal-overlay hidden">
		<div class="modal-content">
			<button class="modal-close-btn" id="info-modal-close-btn">&times;</button>
			<h2 id="info-modal-title">Service Info</h2>
			<div id="info-modal-body" class="info-content"></div>
		</div>
	</div>

	<!-- 모달: 비디오 -->
	<div id="video-modal" class="modal-overlay hidden">
		<div class="modal-content">
			<button class="close-button" id="close-video-modal">&times;</button>
			<div id="video-container"></div>
		</div>
	</div>

	<script src="/member/auth.js" defer></script>
	<script src="assets/main.js" defer></script>
</body>

</html>
